name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  build-test-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Instalar dependencias
        run: bun install --frozen-lockfile

      - name: Validar TypeScript
        run: bun run lint

      - name: Ejecutar pruebas
        run: bun run test

      - name: Construir aplicación
        run: bun run build

      - name: Verificar artefacto dist
        run: test -d dist
